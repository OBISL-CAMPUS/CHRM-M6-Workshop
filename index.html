<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBISL Campus | Training & Development Bilingual Practicum</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <!-- Google Fonts with Sinhala Support -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- MathJax for rendering dynamic LaTeX formulas beautifully -->
    <script type="text/javascript" async
      src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        tex2jax: {
          inlineMath: [['$','$'], ['\\(','\\)']],
          displayMath: [['$$','$$'], ['\\[','\\]']],
          processClass: "mathjax-render",
          ignoreClass: "no-mathjax-render"
        },
        "HTML-CSS": { linebreaks: { automatic: true } },
        SVG: { linebreaks: { automatic: true } }
      });
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        sinhala: ['Noto Sans Sinhala', 'Iskoola Pota', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            900: '#064e3b',
                        },
                        tech: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        /* Glassmorphism Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: 0;
            pointer-events: none;
        }
        
        /* Hidden Scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Fade-in animations for tab changes */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* MathJax visual adjustments */
        .MathJax_Display, .MathJax {
            color: #e2e8f0 !important;
            outline: none;
        }

        /* Printing optimizations */
        @media print {
            body {
                background: white !important;
                color: black !important;
                font-size: 12pt;
            }
            .no-print {
                display: none !important;
            }
            .print-card {
                background: white !important;
                border: 1px solid #ccc !important;
                color: black !important;
                box-shadow: none !important;
                backdrop-filter: none !important;
            }
            .print-active-tab {
                display: block !important;
                width: 100% !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
            }
        }

        /* Pulse indicators */
        .pulse-emerald {
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-em 2s infinite;
        }
        @keyframes pulse-em {
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-brand-500 selection:text-white font-sans antialiased relative overflow-x-hidden">

    <!-- Glowing Decorative Background Elements -->
    <div class="orb w-[300px] sm:w-[400px] h-[300px] sm:h-[400px] bg-brand-900/20 top-[-100px] left-[-100px]"></div>
    <div class="orb w-[350px] sm:w-[500px] h-[350px] sm:h-[500px] bg-tech-700/10 bottom-[10%] right-[-100px]"></div>

    <!-- React Root Entry -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext } = React;

        // Custom React Language Context to pass state deeply
        const LangContext = createContext('en');

        // Custom Raw SVG React Icons (Guarantees standalone offline stability)
        const IconGlobe = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
            </svg>
        );

        const IconDeepDive = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
        );

        const IconScenario = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
            </svg>
        );

        const IconDiagnostic = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
            </svg>
        );

        const IconSim1 = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
            </svg>
        );

        const IconSim2 = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 12l3-3 3 3 4-4M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
            </svg>
        );

        const IconSim3 = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17"></path>
            </svg>
        );

        const IconBreakout = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path>
            </svg>
        );

        const IconPrint = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path>
            </svg>
        );

        // Translational Component with no double-stack fallback
        const Trans = ({ en, si, overrideClass = "" }) => {
            const langMode = useContext(LangContext);
            if (langMode === 'si') {
                return <span className={`font-sinhala ${overrideClass}`}>{si}</span>;
            }
            return <span className={overrideClass}>{en}</span>;
        };

        // Core App Component
        const App = () => {
            const [activeTab, setActiveTab] = useState('case');
            const [langMode, setLangMode] = useState('en'); // 'en', 'si'

            // Shared / Interactive Simulator States
            // Sim 1: L&D Architecture
            const [archMode, setArchMode] = useState('federated'); // centralized, decentralized, federated
            const [isSim1Processing, setIsSim1Processing] = useState(false);

            // Sim 2: Dynamic Decision Cascade
            const [selectedGoal, setSelectedGoal] = useState('cloud'); // 'cloud', 'retention', 'factory'
            const [readinessSlider, setReadinessSlider] = useState(65);
            const [incentiveSlider, setIncentiveSlider] = useState(40);

            // Sim 3: ADDIE vs SAM Workflow Toggle
            const [workflowType, setWorkflowType] = useState('sam'); // addie, sam
            const [activeWorkflowStep, setActiveWorkflowStep] = useState(0);

            // Calculator 1: ROI
            const [roiCost, setRoiCost] = useState(1500000); // LKR
            const [roiGain, setRoiGain] = useState(4500000); // LKR (Gross)

            // Calculator 2: Succession & BSR
            const [criticalRoles, setCriticalRoles] = useState(6);
            const [readyCandidates, setReadyCandidates] = useState(15);

            // Dialogue Prompts Expanded Index
            const [expandedPrompt, setExpandedPrompt] = useState(null);

            // Custom Notification Toast State
            const [toastMessage, setToastMessage] = useState(null);

            const showToast = (enMsg, siMsg) => {
                setToastMessage({ en: enMsg, si: siMsg });
                setTimeout(() => {
                    setToastMessage(null);
                }, 4000);
            };

            // Handlers
            const handleArchChange = (mode) => {
                setIsSim1Processing(true);
                setTimeout(() => {
                    setArchMode(mode);
                    setIsSim1Processing(false);
                    showToast(
                        "Talent Architecture reassigned successfully!",
                        "පුහුණු ආයතනික ව්‍යුහය සාර්ථකව යාවත්කාලීන කරන ලදී!"
                    );
                }, 500);
            };

            const triggerPrint = () => {
                window.print();
            };

            // Dynamic Calculations for Cascade Simulator (Sim 2)
            const cascadeResults = useMemo(() => {
                let successRate = Math.round((readinessSlider * 0.6) + (incentiveSlider * 0.4));
                let timeToValue = Math.max(14, Math.round(90 - (readinessSlider * 0.5) - (incentiveSlider * 0.3)));
                let alignmentMetric = Math.round((incentiveSlider * 0.8) + (readinessSlider * 0.2));
                
                let classificationEn = "High Risk";
                let classificationSi = "ඉහළ අවදානමක්";
                let colorClass = "text-rose-400";
                if (successRate >= 75) {
                    classificationEn = "Optimally Aligned";
                    classificationSi = "උපරිම ගැලපීමක්";
                    colorClass = "text-emerald-400";
                } else if (successRate >= 50) {
                    classificationEn = "Moderate Performance";
                    classificationSi = "මධ්‍යස්ථ මට්ටමක්";
                    colorClass = "text-amber-400";
                }

                return { successRate, timeToValue, alignmentMetric, classificationEn, classificationSi, colorClass };
            }, [readinessSlider, incentiveSlider, selectedGoal]);

            // React Effect to dynamically re-compile and display MathJax formulas
            useEffect(() => {
                if (window.MathJax && window.MathJax.Hub) {
                    window.MathJax.Hub.Queue(["Typeset", window.MathJax.Hub]);
                }
            }, [activeTab, langMode, selectedGoal, readinessSlider, incentiveSlider, workflowType, roiCost, roiGain, criticalRoles, readyCandidates, expandedPrompt]);

            return (
                <LangContext.Provider value={langMode}>
                    <div className="flex flex-col md:flex-row min-h-screen">
                        
                        {/* Toast System Notification with Strict Language Clutter Reduction */}
                        {toastMessage && (
                            <div className="fixed bottom-5 right-5 z-50 max-w-sm bg-slate-900 border border-emerald-500/30 p-4 rounded-xl shadow-2xl flex items-start gap-3 animate-bounce no-mathjax-render">
                                <span className="text-emerald-400 text-lg">💡</span>
                                <div>
                                    {langMode === 'en' ? (
                                        <p className="text-xs font-bold text-slate-100">{toastMessage.en}</p>
                                    ) : (
                                        <p className="text-xs font-bold font-sinhala text-slate-100 leading-relaxed">{toastMessage.si}</p>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Top Navigation Panel for Mobile Devices ONLY */}
                        <div className="md:hidden w-full bg-slate-900/95 sticky top-0 z-30 border-b border-slate-800/80 no-print">
                            <div className="p-3 flex items-center justify-between border-b border-slate-800">
                                <div className="flex items-center gap-2">
                                    <div className="h-7 w-7 rounded bg-emerald-500 flex items-center justify-center font-bold text-slate-950 text-sm shadow">
                                        Ω
                                    </div>
                                    <span className="text-xs font-bold tracking-wider">OBISL CHRM</span>
                                </div>
                                <div className="flex bg-slate-950 border border-slate-800 p-0.5 rounded-lg text-[10px]">
                                    <button 
                                        onClick={() => {
                                            setLangMode('en');
                                            showToast("Language set to English", "භාෂාව ඉංග්‍රීසි ලෙස වෙනස් කරන ලදී.");
                                        }} 
                                        className={`px-3 py-1 rounded transition-all ${langMode === 'en' ? 'bg-emerald-500 text-slate-950 font-bold' : 'text-slate-400'}`}
                                    >
                                        English
                                    </button>
                                    <button 
                                        onClick={() => {
                                            setLangMode('si');
                                            showToast("Language set to Sinhala", "භාෂාව සිංහල ලෙස වෙනස් කරන ලදී.");
                                        }} 
                                        className={`px-3 py-1 rounded transition-all ${langMode === 'si' ? 'bg-emerald-500 text-slate-950 font-bold font-sinhala' : 'text-slate-400'}`}
                                    >
                                        සිංහල
                                    </button>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 overflow-x-auto px-3 py-2.5 no-scrollbar scroll-smooth">
                                {[
                                    { id: 'case', icon: <IconGlobe />, label: 'Case Insight', si: 'සිද්ධිය' },
                                    { id: 'deep', icon: <IconDeepDive />, label: 'Deep Dive', si: 'න්‍යාය' },
                                    { id: 'scenarios', icon: <IconScenario />, label: 'Scenarios', si: 'ප්‍රායෝගික' },
                                    { id: 'diag', icon: <IconDiagnostic />, label: 'Diagnostics', si: 'මිණුම්' },
                                    { id: 'sim1', icon: <IconSim1 />, label: 'Arch Sim', si: 'ව්‍යුහය' },
                                    { id: 'sim2', icon: <IconSim2 />, label: 'Cascade Sim', si: 'තීරණ' },
                                    { id: 'sim3', icon: <IconSim3 />, label: 'Workflow Sim', si: 'ක්‍රියාවලි' },
                                    { id: 'breakout', icon: <IconBreakout />, label: 'Breakout', si: 'සාකච්ඡා' }
                                ].map((tab) => (
                                    <button
                                        key={tab.id}
                                        onClick={() => {
                                            setActiveTab(tab.id);
                                            showToast(`Mapped to ${tab.label}`, `${tab.label} වෙත මාරු විය.`);
                                        }}
                                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all border ${
                                            activeTab === tab.id 
                                            ? 'bg-emerald-500/10 border-emerald-500/40 text-emerald-400 shadow-sm' 
                                            : 'border-transparent text-slate-400 hover:bg-slate-800/40'
                                        }`}
                                        style={{ minHeight: '38px' }}
                                    >
                                        {tab.icon}
                                        <span>{langMode === 'si' ? tab.si : tab.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Left Sidebar - Command Navigation for Desktop Devices Only */}
                        <aside className="hidden md:flex w-64 bg-slate-900/80 backdrop-blur-md border-r border-slate-800/80 flex-col justify-between sticky top-0 h-screen z-20 no-print">
                            <div>
                                {/* Brand & Logo */}
                                <div className="p-5 border-b border-slate-800/80 flex items-center gap-3">
                                    <div className="h-9 w-9 rounded-lg bg-emerald-500 flex items-center justify-center font-bold text-slate-950 text-lg shadow-lg shadow-emerald-500/30 pulse-emerald">
                                        Ω
                                    </div>
                                    <div>
                                        <h1 className="text-sm font-bold tracking-wider text-white">OBISL CAMPUS</h1>
                                        <p className="text-[10px] text-emerald-400 uppercase tracking-widest font-semibold">T&D Practicum</p>
                                    </div>
                                </div>

                                {/* Tabs List */}
                                <nav className="p-4 space-y-1 overflow-y-auto no-scrollbar max-h-[calc(100vh-180px)]">
                                    {[
                                        { id: 'case', icon: <IconGlobe />, label: 'Case Insight', si: 'සිද්ධි අධ්‍යයනය' },
                                        { id: 'deep', icon: <IconDeepDive />, label: 'Deep Dive Analysis', si: 'විශ්ලේෂණය' },
                                        { id: 'scenarios', icon: <IconScenario />, label: 'Scenario Suite', si: 'ප්‍රායෝගික අවස්ථා' },
                                        { id: 'diag', icon: <IconDiagnostic />, label: 'Diagnostic Lab', si: 'මිණුම් විද්‍යාගාරය' },
                                        { id: 'sim1', icon: <IconSim1 />, label: 'Architecture Sim', si: 'ව්‍යුහ අනුකරණය' },
                                        { id: 'sim2', icon: <IconSim2 />, label: 'Decision Cascade', si: 'තීරණ ප්‍රවාහය' },
                                        { id: 'sim3', icon: <IconSim3 />, label: 'Workflow Sim', si: 'ක්‍රියාවලි අනුකරණය' },
                                        { id: 'breakout', icon: <IconBreakout />, label: 'Breakout Rooms', si: 'සාකච්ඡා කුටි' }
                                    ].map((tab) => (
                                        <button
                                            key={tab.id}
                                            onClick={() => {
                                                setActiveTab(tab.id);
                                                showToast(
                                                    `Mapped to ${tab.label}`,
                                                    `${tab.si} වෙත මාරු විය.`
                                                );
                                            }}
                                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group text-left ${
                                                activeTab === tab.id 
                                                ? 'bg-emerald-500/15 border border-emerald-500/30 text-emerald-400 shadow-md' 
                                                : 'hover:bg-slate-800/40 text-slate-400 hover:text-slate-200 border border-transparent'
                                            }`}
                                        >
                                            <div className={`transition-transform duration-200 ${activeTab === tab.id ? 'scale-110 text-emerald-400' : 'text-slate-400 group-hover:text-slate-200'}`}>
                                                {tab.icon}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                {langMode === 'en' ? (
                                                    <div className="text-xs font-semibold truncate">{tab.label}</div>
                                                ) : (
                                                    <div className="text-xs font-semibold font-sinhala truncate">{tab.si}</div>
                                                )}
                                            </div>
                                        </button>
                                    ))}
                                </nav>
                            </div>

                            {/* Print Trigger & Support */}
                            <div className="p-4 border-t border-slate-800/80 space-y-3 bg-slate-950/20 font-sans">
                                <button 
                                    onClick={triggerPrint}

                                                    diagnosis: "Capability deficit ('Can't Do') combined with adult learners reacting poorly to top-down lecture instruction.",
                                                    siDiagnosis: "හැකියාවන්ගේ හිඟකම ('Can't Do') සහ සාම්ප්‍රදායික දේශන ක්‍රමවේද පිළිබඳ වැඩිහිටි ඉගෙනුම්කරුවන්ගේ ඇති අකමැත්ත.",

                                                    siDiagnosis: "නිරවද්‍යතා මිනුම් පිළිබඳ හැකියාවන්ගේ හිඟකම සහ සේවා ස්ථානයේදී ක්ෂණිකව දෝෂ පරීක්ෂා කිරීමේ මෙවලම් නොමැතිකම.",

                                                },

                                                    issue: "Branch personnel actively avoid onboarding walk-in retail customers onto the bank's newly developed digital mobile app.",
                                                    siIssue: "බැංකු ශාඛා සේවකයින් පාරිභෝගිකයින්ව බැංකුවේ නවතම ජංගම යෙදුම (Mobile App) වෙත යොමු කිරීමෙන් සිතාමතාම වැළකී සිටියේය.",
                                                    diagnosis: "Motivational barrier ('Won't Do'). Commission metrics solely rewarded high-value, manual fixed-deposit paperwork.",
                                                    siDiagnosis: "අභිප්‍රේරණ ගැටලුව ('Won't Do'). සේවකයින්ගේ කොමිස් ක්‍රමය සකසා තිබුණේ ශාඛාව තුළ සිදුකරන ස්ථාවර තැන්පතු කටයුතුවලට පමණි.",

                                {/* TAB 4: DIAGNOSTIC LAB (Calculators with dynamic LaTeX math typesetting) */}
                                {activeTab === 'diag' && (
                                    <section className="space-y-6 print-active-tab animate-fadeIn">
                                        <div className="border-b border-slate-800 pb-3">
                                            <h3 className="text-lg sm:text-xl font-bold text-slate-100 flex items-center gap-2">
                                                <span className="text-emerald-500">⚙️</span>
                                                <Trans en="Interactive Diagnostic Metrics Lab" si="මිණුම් හා ආයෝජන ප්‍රතිලාභ විද්‍යාගාරය" />
                                            </h3>
                                            <p className="text-xs text-slate-400 mt-1">
                                                <Trans en="Live-update calculators demonstrating Level 4 ROI & Bench Strength Succession Planning" si="පුහුණුවේ ආයෝජන ප්‍රතිලාභය (ROI) සහ අනුප්‍රාප්තික සූදානම්තාව (BSR) ගණනය කරන්න" />
                                            </p>
                                        </div>

                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                            
                                            {/* Calculator 1: Kirkpatrick Level 4 ROI */}
                                            <div className="bg-slate-900/60 border border-slate-800 rounded-2xl p-5 sm:p-6 flex flex-col justify-between">
                                                <div>
                                                    <div className="flex items-center justify-between mb-4">
                                                        <h4 className="text-xs sm:text-sm font-bold text-slate-200 uppercase tracking-wider flex items-center gap-1.5">
                                                            <span className="text-tech-400">📊</span>
                                                            <Trans en="Training Return on Investment (ROI)" si="පුහුණු ආයෝජන ප්‍රතිලාභය (ROI)" />
                                                        </h4>
                                                        <span className="text-[10px] bg-tech-500/10 text-tech-400 font-bold px-2.5 py-0.5 rounded-full">Level 4 Result</span>
                                                    </div>

                                                    <div className="p-4 bg-slate-950/60 border border-slate-800/80 rounded-xl space-y-2 mb-6">
                                                        <div className="text-xs font-bold text-slate-400 mb-1">
                                                            <Trans en="Standard Kirkpatrick Level 4 Formula Matrix:" si="Kirkpatrick Level 4 සම්මත ගණිතමය සූත්‍රය:" />
                                                        </div>
                                                        <div className="text-slate-100 text-xs overflow-x-auto no-scrollbar py-1">
                                                            {"$$\\text{ROI} = \\left( \\frac{\\text{Net Financial Benefits}}{\\text{Total Training Costs}} \\right) \\times 100\\%$$"}
                                                            {"$$\\text{Net Financial Benefits} = \\text{Gross Value Created} - \\text{Total Training Costs}$$"}
                                                        </div>
                                                    </div>

                                                    {/* Inputs */}
                                                    <div className="space-y-5">
                                                        <div>
                                                            <div className="flex flex-col sm:flex-row sm:justify-between text-xs font-semibold mb-2 gap-1">
                                                                <Trans en="Total Training Cost (LKR)" si="මුළු පුහුණු පිරිවැය (රුපියල්)" />
                                                                <span className="text-tech-400 font-mono font-bold text-right">රු. {roiCost.toLocaleString()}</span>
                                                            </div>
                                                            <input 
                                                                type="range" 
                                                                min="200000" 
                                                                max="5000000" 
                                                                step="50000"
                                                                value={roiCost} 
                                                                onChange={(e) => setRoiCost(Number(e.target.value))}
                                                                className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500"
                                                                style={{ minHeight: '30px' }}
                                                            />
                                                        </div>

                                                        <div>
                                                            <div className="flex flex-col sm:flex-row sm:justify-between text-xs font-semibold mb-2 gap-1">
                                                                <Trans en="Gross Financial Benefits / Value Created (LKR)" si="ලැබුණු මුළු මූල්‍යමය වාසිය (රුපියල්)" />
                                                                <span className="text-emerald-400 font-mono font-bold text-right font-sinhala">රු. {roiGain.toLocaleString()}</span>
                                                            </div>
                                                            <input 
                                                                type="range" 
                                                                min="500000" 
                                                                max="15000000" 
                                                                step="100000"
                                                                value={roiGain} 
                                                                onChange={(e) => setRoiGain(Number(e.target.value))}
                                                                className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500"
                                                                style={{ minHeight: '30px' }}
                                                            />
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Output Metrics */}
                                                <div className="mt-8 pt-6 border-t border-slate-800/80">
                                                    {(() => {
                                                        const netBenefits = roiGain - roiCost;
                                                        const calculatedRoi = Math.round((netBenefits / roiCost) * 100);
                                                        const isLow = calculatedRoi < 30;
                                                        const isNegative = calculatedRoi < 0;

                                                        return (
                                                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                                                <div className="w-full sm:w-auto text-left">
                                                                    <span className="text-xs text-slate-400 font-bold block mb-0.5"><Trans en="ROI SCORE" si="ආයෝජන ප්‍රතිලාභය" /></span>
                                                                    <span className={`text-3xl sm:text-4xl font-extrabold tracking-tight ${isNegative ? 'text-rose-500' : isLow ? 'text-amber-500' : 'text-emerald-400'}`}>
                                                                        {calculatedRoi}%
                                                                    </span>
                                                                </div>

                                                                <div className={`w-full sm:flex-1 p-3.5 rounded-xl border ${isNegative ? 'bg-rose-950/20 border-rose-500/20 text-rose-400' : isLow ? 'bg-amber-950/20 border-amber-500/20 text-amber-400' : 'bg-emerald-950/20 border-emerald-500/20 text-emerald-400'} text-xs font-semibold flex items-start gap-2.5`}>
                                                                    <span className="mt-0.5">{isNegative ? '❌' : isLow ? '⚠️' : '✅'}</span>
                                                                    <p className="leading-snug">
                                                                        {isNegative ? (

                                                    prompt: "As artificial intelligence automates cognitive operational work, standard skill half-lives are dropping to under 18 months. How can traditional training cycles survive when curriculum design takes longer than skill obsolescence?",
                                                    siPrompt: "කෘතිම බුද්ධිය (AI) නිසා තාක්ෂණික කුසලතාවල වලංගු කාලය මාස 18කට වඩා අඩු වී ඇත. සාම්ප්‍රදායික පුහුණු පන්ති සැලසුම් කිරීමට ගතවන කාලයට වඩා වේගයෙන් කුසලතා යල්පැන යන විට අප මුහුණ දිය යුත්තේ කෙසේද?",
                                                    crib: "Instructional Advice: Champion rapid adaptive cycles (SAM) over linear curriculums. Advocate for continuous OJT loops, AI copilot shadowing, and performance support engines."
                                                }
                                            ].map((prompt, i) => (
                                                <div 
                                                    key={i} 
                                                    className="bg-slate-900/60 border border-slate-800 rounded-2xl overflow-hidden hover:border-emerald-500/30 transition-all animate-fadeIn"
                                                >
                                                    {/* Header Bar */}
                                                    <button 
                                                        onClick={() => {
                                                            setExpandedPrompt(expandedPrompt === i ? null : i);
                                                            showToast(
                                                                expandedPrompt === i ? `Closed Prompt ${prompt.num}` : `Opened Prompt ${prompt.num}`, 
                                                                expandedPrompt === i ? `සාකච්ඡා කුටිය වසන ලදී.` : `සාකච්ඡා කුටිය විවෘත කරන ලදී.`
                                                            );
                                                        }}
                                                        className="w-full p-4 sm:p-5 text-left flex items-start sm:items-center justify-between gap-4 bg-slate-950/20 hover:bg-slate-950/40 transition-colors border-none cursor-pointer"
                                                        style={{ minHeight: '50px' }}
                                                    >
                                                        <div className="flex items-center gap-3.5 flex-1 min-w-0">
                                                            <span className="text-emerald-400 font-mono text-xs font-bold bg-emerald-500/10 px-2.5 py-1 rounded-lg">
                                                                {prompt.num}
                                                            </span>
                                                            <div className="truncate">
                                                                <h4 className="text-xs sm:text-sm font-bold text-slate-200 truncate">
                                                                    <Trans en={prompt.title} si={prompt.siTitle} />
                                                                </h4>
                                                            </div>
                                                        </div>
                                                        <span className="text-[10px] sm:text-xs font-bold text-slate-500 whitespace-nowrap">
                                                            {expandedPrompt === i ? 'CLOSE / වසන්න' : 'EXPAND / විවෘත කරන්න'}
                                                        </span>
                                                    </button>

                                                    {/* Content Area */}
                                                    {expandedPrompt === i && (
                                                        <div className="p-5 sm:p-6 border-t border-slate-800 space-y-4 bg-slate-950/40 animate-fadeIn">
                                                            <div className="text-xs sm:text-sm text-slate-200 leading-relaxed font-semibold animate-fadeIn">
                                                                <Trans en={prompt.prompt} si={prompt.siPrompt} />
                                                            </div>

                                                            {/* Instructor Crib Guide */}
                                                            <div className="bg-emerald-950/20 border border-emerald-500/20 p-4 rounded-xl text-[11px] text-emerald-400 font-sans mt-4">
                                                                <strong className="text-xs block mb-1">💡 Instructor Evaluation Guide / දේශක මඟපෙන්වීම:</strong>
                                                                {prompt.crib}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                )}

                            </div>

                            {/* Interactive Footer & Status Monitor */}
                            <footer className="mt-auto border-t border-slate-900/80 py-4 px-6 flex flex-col sm:flex-row items-center justify-between text-xs text-slate-500 gap-3 no-print bg-slate-950/60 backdrop-blur font-sans">
                                <div>OBISL CAMPUS • ADVANCED TRAINING & DEVELOPMENT PRACTICUM</div>
                                <div className="flex items-center gap-2 text-emerald-400 font-semibold bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">
                                    <span className="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    <span><Trans en="Active Practical Session" si="සජීවී ප්‍රායෝගික සැසිය" /></span>
                                </div>
                                <div className="font-mono text-[10px]">OBISL-M6-V1.0</div>
                            </footer>

                        </main>
                    </div>
                </LangContext.Provider>
            );
        };

        // Standard mount logic with protection against race conditions
        const mountApp = () => {
            const container = document.getElementById('root');
            if (container) {
                const root = ReactDOM.createRoot(container);
                root.render(<App />);
            }
        };

        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', mountApp);
        } else {
            mountApp();
        }
    </script>
</body>
</html>
